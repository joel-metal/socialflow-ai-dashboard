apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: socialflow-backend
spec:
  podSelector:
    matchLabels:
      app: socialflow-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3001
  egress:
    # DNS - required for all name resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Redis (ElastiCache) - session and queue storage
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # PostgreSQL (RDS) - primary database
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # OTLP collector - observability telemetry
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4318
    # External platform APIs - HTTPS only
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
